<!DOCTYPE html>
<html>
<head>
    <title>Edit Startup Idea</title>
    <style>
        body {
            font-family: "Segoe UI", Roboto, Arial, sans-serif;
            background: #eef2f7;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            width: 60%;
            max-width: 700px;
            background: white;
            padding: 40px;
            margin-top: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        label { font-weight: 600; margin-top:10px; display:block; }
        input,textarea {
            width:100%; padding:12px; margin-bottom:20px;
            border:2px solid #dcdde1; border-radius:8px;
        }
        button {
            width:100%; padding:14px; border:none; border-radius:8px;
            background:#0984e3; color:white; font-size:17px; font-weight:600;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Edit Startup Idea</h2>

    /startup/update

        <input type="hidden" name="id" th:value="${startup.id}">

        <label>Student ID:</label>
        <input type="number" name="studentId" th:value="${startup.studentId}" required>

        <label>Name:</label>
        <input type="text" name="studentName" th:value="${startup.studentName}" required>

        <label>Idea Title:</label>
        <input type="text" name="ideaTitle" th:value="${startup.ideaTitle}" required>

        <label>Description:</label>
        <textarea name="ideaDescription" rows="5" th:text="${startup.ideaDescription}" required></textarea>

        <label>Skills Required:</label>
        <input type="text" name="skillsRequired" th:value="${startup.skillsRequired}">

        <label>Contact Email:</label>
        <input type="email" name="contactEmail" th:value="${startup.contactEmail}" required>

        <label>Mobile Number:</label>
        <input type="text" name="mobileNumber" th:value="${startup.mobileNumber}" required>

        <label>Mentor Name (Optional):</label>
        <input type="text" name="mentorName" th:value="${startup.mentorName}">

        <button type="submit">Save Changes</button>

    </form>

</div>

</body>
</html>
