<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Publications</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    :root { --border:#e5e7eb; --muted:#6b7280; --link:#0b5ed7; }
    body { font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; margin:0; color:#0f172a; }
    .container { max-width: 980px; margin: 28px auto; padding: 0 16px; }
    .toolbar { margin-bottom: 12px; }
    .toolbar a { color: var(--link); text-decoration: none; }
    h1 { margin: 4px 0 18px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(240px,1fr)); gap:16px; }
    .card {
      border:1px solid var(--border); border-radius:12px; padding:18px;
      text-decoration:none; color:inherit; background:#fff;
      transition: box-shadow .2s ease, transform .2s ease;
    }
    .card:hover { box-shadow: 0 10px 24px rgba(0,0,0,.08); transform: translateY(-2px); }
    .card h2 { margin: 6px 0 6px; font-size: 20px; }
    .muted { color: var(--muted); }
    .thumb { width:100%; height:140px; object-fit:cover; border-radius:8px; border:1px solid var(--border); background:#f8fafc; }
  </style>
</head>
<body>
<div class="container">

  <div class="toolbar">
    <a th:href="@{/home}">← Back to Home</a>
  </div>

  <h1>Publications</h1>
  <p class="muted">Choose one of the sections below.</p>

  <div class="grid">

    <!-- Students -->
    <a class="card" th:href="@{/publications/students}">
      <h2>Students Publications</h2>
      <p class="muted">Projects, papers, patents, batch-wise view.</p>
    </a>

    <!-- Faculty -->
    <a class="card" th:href="@{/publications/faculty}">
       <h2>Faculty Publications</h2>
      <p class="muted">Research papers, patents, books, and more.</p>
    </a>

  </div>

</div>
</body>
</html>
