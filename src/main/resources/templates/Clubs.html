<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Clubs</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #003366;
            margin-bottom: 30px;
        }

        .club-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .club-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .club-card:hover {
            transform: translateY(-5px);
        }

        .club-card h3 {
            color: #003366;
        }

        .club-card a {
            text-decoration: none;
            background: #003366;
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            display: inline-block;
            margin-top: 10px;
        }

        .club-card a:hover {
            background: #0055aa;
        }
    </style>
</head>

<body>

<h1>🎯 Our Clubs</h1>

<div class="club-container">

    <div class="club-card">
        <h3>Detox Club</h3>
        <a th:href="@{/clubs/detox}">View Details</a>
    </div>

    <div class="club-card">
        <h3>Humour Club</h3>
        <a th:href="@{/clubs/humour}">View Details</a>
    </div>

    <div class="club-card">
        <h3>Science Club</h3>
        <a th:href="@{/clubs/science}">View Details</a>
    </div>

    <div class="club-card">
        <h3>TEDx Club</h3>
        <a th:href="@{/clubs/tedx}">View Details</a>
    </div>

    <div class="club-card">
        <h3>Cultural Club</h3>
        <a th:href="@{/clubs/cultural}">View Details</a>
    </div>

    <div class="club-card">
        <h3>Yoga Club</h3>
        <a th:href="@{/clubs/yoga}">View Details</a>
    </div>

    <div class="club-card">
        <h3>Math Club</h3>
        <a th:href="@{/clubs/math}">View Details</a>
    </div>

    <div class="club-card">
        <h3>Photography Club</h3>
        <a th:href="@{/clubs/photography}">View Details</a>
    </div>

</div>

</body>
</html>
